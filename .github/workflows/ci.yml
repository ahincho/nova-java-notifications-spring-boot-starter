name: CI/CD Pipeline

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

jobs:
  build:
    uses: ahincho/nova-devops/.github/workflows/reusable-build-gradle.yml@main
    secrets: inherit

  sonar:
    uses: ahincho/nova-devops/.github/workflows/reusable-sonarcloud-gradle.yml@main
    with:
      sonar-org: ahincho
      sonar-project-key: ahincho_nova-java-notifications-spring-boot-starter
    secrets: inherit

  matrix:
    uses: ahincho/nova-devops/.github/workflows/reusable-build-matrix.yml@main
    with:
      build-tool: gradle
    secrets: inherit