name: Publish on Tag

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Validate tag format
        run: |
          if [[ ! "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag ${{ github.ref_name }} does not match vX.Y.Z format"
            exit 1
          fi
          echo "Tag ${{ github.ref_name }} is valid semver"

      - name: Sync version from tag to gradle.properties
        run: |
          TAG_VERSION="${{ github.ref_name }}"
          VERSION="${TAG_VERSION#v}"
          echo "Setting version=${VERSION} in gradle.properties"
          sed -i "s/^version=.*/version=${VERSION}/" gradle.properties
          cat gradle.properties

      - name: Nova Setup Java
        uses: ahincho/nova-devops/.github/actions/nova-setup-java@main
        with:
          java-version: '25'
          build-tool: gradle

      - name: Resolve package visibility
        id: visibility
        env:
          REPO_VISIBILITY: ${{ github.event.repository.visibility }}
          VAR_VISIBILITY: ${{ vars.NOVA_PACKAGE_VISIBILITY }}
        run: |
          if [ -n "${VAR_VISIBILITY}" ]; then
            EFFECTIVE="${VAR_VISIBILITY}"
          else
            EFFECTIVE="public"
          fi
          echo "value=${EFFECTIVE}" >> "$GITHUB_OUTPUT"
          echo "Effective visibility: ${EFFECTIVE}"

      - name: Validate visibility compatibility
        shell: bash
        run: |
          REPO_VIS="${{ github.event.repository.visibility }}"
          PKG_VIS="${{ steps.visibility.outputs.value }}"
          if [ "${REPO_VIS}" = "public" ] && [ "${PKG_VIS}" = "private" ]; then
            echo "::error::Cannot publish private package from public repo"
            exit 1
          fi
          if [ "${REPO_VIS}" = "private" ] && [ "${PKG_VIS}" = "public" ]; then
            echo "::error::Cannot publish public package from private repo"
            exit 1
          fi
          echo "Visibility validation OK"

      - name: Resolve packages read token
        id: resolve_token
        env:
          ACTOR: ${{ github.actor }}
          TOKEN_A: ${{ secrets.NOVA_PACKAGES_READ_TOKEN }}
          TOKEN_B: ${{ secrets.NOVA_RELEASE_PAT }}
          TOKEN_C: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Pick the first non-empty token (NOVA_PACKAGES_READ_TOKEN > NOVA_RELEASE_PAT > GITHUB_TOKEN).
          # GitHub Actions expression `secrets.X || secrets.Y` doesn't short-circuit
          # the way bash `||` does; we do it in shell instead.
          if [ -n "${TOKEN_A}" ]; then
            echo "value=${TOKEN_A}" >> "$GITHUB_OUTPUT"
          elif [ -n "${TOKEN_B}" ]; then
            echo "value=${TOKEN_B}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${TOKEN_C}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to GitHub Packages
        run: ./gradlew publish -Pvisibility=${{ steps.visibility.outputs.value }}
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Used only to READ internal Nova Platform dependencies published in other
          # repos' GitHub Packages (GITHUB_TOKEN cannot read packages cross-repo).
          NOVA_PACKAGES_READ_TOKEN: ${{ steps.resolve_token.outputs.value }}